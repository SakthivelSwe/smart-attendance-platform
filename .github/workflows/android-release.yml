name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*.*.*' # Triggers on semantic version tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Flutter Android builds require Java 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4' # Match the version used locally
          channel: 'stable'

      - name: Install Dependencies
        working-directory: ./mobile
        run: flutter pub get

      - name: Build APK
        working-directory: ./mobile
        run: flutter build apk --release

      - name: Rename APK
        working-directory: ./mobile
        run: mv build/app/outputs/flutter-apk/app-release.apk SmartAttend.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartAttend-APK
          path: mobile/SmartAttend.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/SmartAttend.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
